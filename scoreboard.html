<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fencing Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --panel: #111116;
      --border: #2a2a35;
      --dim: #1e1e28;
      --text: #e8e8f0;
      --sub: #6a6a80;
      --left-col: #e63535;
      --right-col: #00c44f;
      --off-col: #d4d0c0;
      --yellow-c: #f5c842;
      --red-c: #e63535;
      --pcard-c: #8b5cf6;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 4px;
      color: var(--text);
    }

    #conn-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--sub);
      background: var(--dim);
      transition: all 0.3s;
    }

    #conn-status.connected {
      color: var(--right-col);
      border-color: var(--right-col);
    }

    #conn-status.disconnected {
      color: var(--left-col);
      border-color: var(--left-col);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr auto auto;
      gap: 0;
      padding: 16px;
    }

    /* LIGHTS ROW */
    .lights-row {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .lights-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
    }

    .lights-side.right {
      align-items: center;
    }

    .light-valid {
      width: 100%;
      /* height: 120px; */
      flex: 1;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: #111;
      transition: background 0.08s, box-shadow 0.08s;
    }

    .light-valid.on-left {
      background: var(--left-col);
      border-color: var(--left-col);
      box-shadow: 0 0 24px rgba(0, 196, 79, 0.5);
    }

    .light-valid.on-right {
      background: var(--right-col);
      border-color: var(--right-col);
      box-shadow: 0 0 24px rgba(230, 53, 53, 0.5);
    }

    .light-off {
      width: 100%;
      /* height: 36px; */
      flex: 0.3;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: #111;
      transition: background 0.08s, box-shadow 0.08s;
    }

    .light-off.on {
      background: var(--off-col);
      border-color: var(--off-col);
      box-shadow: 0 0 16px rgba(212, 208, 192, 0.4);
    }

    .lights-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .period-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 3px;
      color: var(--sub);
    }

    .period-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--text);
      line-height: 1;
    }

    /* SCORE ROW */
    .score-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .score-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 16px;
    }

    .score-side.left {
      border-right: 1px solid var(--border);
    }

    .score-side.right {
      border-left: 1px solid var(--border);
    }

    .fencer-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .fencer-name.left {
      color: var(--left-col);
    }

    .fencer-name.right {
      color: var(--right-col);
    }

    .score-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6rem;
      line-height: 1;
      color: var(--text);
      min-width: 2ch;
      text-align: center;
    }

    .score-btns {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .score-btns button {
      font-size: 1.4rem;
      padding: 8px 20px;
      min-width: 56px;
    }

    .timer-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      min-width: 200px;
      gap: 6px;
    }

    .timer-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--sub);
    }

    .timer-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: 4rem;
      letter-spacing: 2px;
      color: var(--text);
      line-height: 1;
      transition: color 0.3s;
    }

    .timer-display.low {
      color: var(--right-col);
      animation: pulse 0.8s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.5
      }
    }

    /* Big toggle button */
    #btn-toggle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      padding: 14px 32px;
      border-radius: 6px;
      border: 2px solid var(--right-col);
      background: var(--right-col);
      color: #000;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      width: 100%;
      margin-top: 4px;
    }

    #btn-toggle.running {
      background: var(--left-col);
      border-color: var(--left-col);
      color: #fff;
    }

    #btn-toggle:active {
      transform: scale(0.97);
    }

    .preset-btns {
      display: flex;
      gap: 6px;
      width: 100%;
    }

    .preset-btns button {
      flex: 1;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
    }

    /* CARDS ROW */
    .cards-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cards-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .cards-panel h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      margin-bottom: 12px;
      text-align: center;
    }

    .cards-panel.left h3 {
      color: var(--left-col);
    }

    .cards-panel.right h3 {
      color: var(--right-col);
    }

    /* Two-column layout inside cards panel */
    .cards-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .counter-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .counter-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.5rem;
      letter-spacing: 1px;
      color: var(--sub);
    }

    /* The colored rectangle behind the count */
    .counter-rect {
      width: 100%;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: var(--dim);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
      min-height: 56px;
    }

    .counter-rect:active {
      transform: scale(0.97);
    }

    .counter-rect.yellow {
      background: var(--yellow-c);
      border-color: var(--yellow-c);
    }

    .counter-rect.red {
      background: var(--red-c);
      border-color: var(--red-c);
    }

    .counter-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      line-height: 1;
      color: var(--text);
    }

    .counter-rect.yellow .counter-num {
      color: #000;
    }

    .counter-rect.red .counter-num {
      color: #fff;
    }

    .counter-reset {
      font-size: 0.7rem;
      padding: 3px 10px;
      font-family: 'Share Tech Mono', monospace;
    }

    /* Buttons */
    button {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 1px;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--dim);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    button:hover {
      background: var(--border);
    }

    button:active {
      transform: scale(0.96);
    }

    button.primary {
      background: var(--right-col);
      border-color: var(--right-col);
      color: #000;
    }

    button.primary:hover {
      filter: brightness(1.2);
    }

    button.danger {
      background: var(--left-col);
      border-color: var(--left-col);
      color: #fff;
    }

    button.danger:hover {
      filter: brightness(1.2);
    }

    button.small {
      padding: 3px 7px;
      font-size: 0.72rem;
    }

    /* Settings modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      min-width: 300px;
      max-width: 90vw;
    }

    .modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 4px;
      margin-bottom: 16px;
      color: var(--text);
    }

    .modal label {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 1px;
      color: var(--sub);
      margin-bottom: 4px;
      margin-top: 12px;
    }

    .modal input {
      width: 100%;
      background: var(--dim);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 6px 10px;
      outline: none;
    }

    .modal input:focus {
      border-color: var(--left-col);
    }

    .modal-btns {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: flex-end;
    }

    /* Control bar */
    .ctrl-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      justify-content: center;
    }

    @keyframes buzzerFlash {

      0%,
      100% {
        background: var(--bg);
      }

      25%,
      75% {
        background: #1a0000;
      }

      50% {
        background: #2a0000;
      }
    }

    body.buzzer {
      animation: buzzerFlash 0.4s 3;
    }
  </style>
</head>

<body>

  <header>
    <h1>FENCING SCOREBOARD</h1>
    <span id="conn-status">- DISCONNECTED</span>
  </header>

  <main>
    <!-- LIGHTS -->
    <div class="lights-row">
      <div class="lights-side left">
        <div class="light-valid" id="light-left-valid" title="Left valid hit"></div>
        <div class="light-off" id="light-left-off" title="Left off-target"></div>
      </div>
      <div class="lights-center">
        <!-- <div class="period-label">PERIOD</div>
        <div class="period-num" id="period-num">1</div> -->
      </div>
      <div class="lights-side right">
        <div class="light-valid" id="light-right-valid" title="Right valid hit"></div>
        <div class="light-off" id="light-right-off" title="Right off-target"></div>
      </div>
    </div>

    <!-- SCORE + TIMER -->
    <div class="score-row">
      <div class="score-side left">
        <!-- <div class="fencer-name left">LEFT</div> -->
        <div class="score-display" id="score-left">0</div>
        <div class="score-btns">
          <button onclick="send('l_score+')" class="danger">+</button>
          <button onclick="send('l_score-')">-</button>
        </div>
      </div>

      <div class="timer-center">
        <!-- <div class="timer-label">TIME</div> -->
        <div class="timer-display" id="timer-display">3:00</div>
        <button id="btn-toggle" onclick="toggleTimer()">START</button>
        <div class="preset-btns">
          <button onclick="send('set_time 3:00')">3 MIN</button>
          <button onclick="send('set_time 1:00')">1 MIN</button>
        </div>
      </div>

      <div class="score-side right">
        <!-- <div class="fencer-name right">RIGHT</div> -->
        <div class="score-display" id="score-right">0</div>
        <div class="score-btns">
          <button onclick="send('r_score+')" class="primary">+</button>
          <button onclick="send('r_score-')">-</button>
        </div>
      </div>
    </div>

    <!-- CARDS -->
    <div class="cards-row">
      <!-- Left cards -->
      <div class="cards-panel left">
        <h3>CARDS</h3>
        <div class="cards-cols">
          <div class="counter-block">
            <div class="counter-label">PENALTIES</div>
            <div class="counter-rect" id="pen-left-rect" onclick="incrementPenalty('left')">
              <div class="counter-num" id="pen-left-num">0</div>
            </div>
            <button class="counter-reset small" onclick="resetPenalty('left')">RESET</button>
          </div>
          <div class="counter-block">
            <div class="counter-label">P-CARD</div>
            <div class="counter-rect" id="pcard-left-rect" onclick="incrementPcard('left')">
              <div class="counter-num" id="pcard-left-num">0</div>
            </div>
            <button class="counter-reset small" onclick="resetPcard('left')">RESET</button>
          </div>
        </div>
      </div>

      <!-- Right cards -->
      <div class="cards-panel right">
        <h3>CARDS</h3>
        <div class="cards-cols">
          <div class="counter-block">
            <div class="counter-label">PENALTIES</div>
            <div class="counter-rect" id="pen-right-rect" onclick="incrementPenalty('right')">
              <div class="counter-num" id="pen-right-num">0</div>
            </div>
            <button class="counter-reset small" onclick="resetPenalty('right')">RESET</button>
          </div>
          <div class="counter-block">
            <div class="counter-label">P-CARD</div>
            <div class="counter-rect" id="pcard-right-rect" onclick="incrementPcard('right')">
              <div class="counter-num" id="pcard-right-num">0</div>
            </div>
            <button class="counter-reset small" onclick="resetPcard('right')">RESET</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Control bar -->
  <div class="ctrl-bar">
    <button onclick="send('clear')">CLEAR LIGHTS</button>
    <button onclick="openSetTime()">SET TIME</button>
    <button onclick="send('reset_time')">RESET TIME</button>
    <button onclick="resetAll()" class="danger">RESET ALL</button>
    <button onclick="openSettings()">SETTINGS</button>
  </div>

  <!-- Set Time Modal -->
  <div class="modal-overlay" id="modal-settime">
    <div class="modal">
      <h2>SET TIMER</h2>
      <label>Time (MM:SS)</label>
      <input type="text" id="input-time" placeholder="3:00" value="3:00">
      <div class="modal-btns">
        <button onclick="closeModals()">Cancel</button>
        <button class="primary" onclick="applySetTime()">Apply</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="modal-settings">
    <div class="modal">
      <h2>SETTINGS</h2>
      <label>WebSocket Server (ws://...)</label>
      <input type="text" id="input-ws" placeholder="ws://localhost:8765">
      <div class="modal-btns">
        <button onclick="closeModals()">Cancel</button>
        <button class="primary" onclick="applySettings()">Connect</button>
      </div>
    </div>
  </div>

  <script>
    // Local counter state (not server-managed)
    const localState = {
      penalties: { left: 0, right: 0 },
      pcards: { left: 0, right: 0 },
    };

    let timerRunning = false;

    function updateCounterRect(rectId, numId, value) {
      const rect = document.getElementById(rectId);
      const num = document.getElementById(numId);
      num.textContent = value;
      rect.classList.remove('yellow', 'red');
      if (value === 1) rect.classList.add('yellow');
      else if (value >= 2) rect.classList.add('red');
    }

    function incrementPenalty(side) {
      localState.penalties[side] = Math.min(99, localState.penalties[side] + 1);
      updateCounterRect('pen-' + side + '-rect', 'pen-' + side + '-num', localState.penalties[side]);
    }
    function resetPenalty(side) {
      localState.penalties[side] = 0;
      updateCounterRect('pen-' + side + '-rect', 'pen-' + side + '-num', 0);
    }

    function incrementPcard(side) {
      localState.pcards[side] = Math.min(99, localState.pcards[side] + 1);
      updateCounterRect('pcard-' + side + '-rect', 'pcard-' + side + '-num', localState.pcards[side]);
    }
    function resetPcard(side) {
      localState.pcards[side] = 0;
      updateCounterRect('pcard-' + side + '-rect', 'pcard-' + side + '-num', 0);
    }

    function resetAllLocal() {
      ['left', 'right'].forEach(side => {
        resetPenalty(side);
        resetPcard(side);
      });
    }

    function resetAll() {
      send('reset_all');
      resetAllLocal();
    }

    // WebSocket
    let ws = null;
    let wsUrl = 'ws://localhost:8765';
    let reconnectTimer = null;

    function connect() {
      if (ws) { try { ws.close(); } catch (e) { } }
      ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        setStatus('connected', '- CONNECTED');
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'state') applyState(msg.data);
        if (msg.type === 'buzzer') triggerBuzzer();
      };
      ws.onclose = () => {
        setStatus('disconnected', '- DISCONNECTED');
        reconnectTimer = setTimeout(connect, 2000);
      };
      ws.onerror = () => { setStatus('disconnected', '- ERROR'); };
    }

    function send(cmd) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'command', cmd }));
      }
    }

    function setStatus(cls, text) {
      const el = document.getElementById('conn-status');
      el.className = cls;
      el.textContent = text;
    }

    function toggleTimer() {
      if (timerRunning) send('stop');
      else send('start');
    }

    function applyState(s) {
      // Lights
      const lv = document.getElementById('light-left-valid');
      const rv = document.getElementById('light-right-valid');
      const lo = document.getElementById('light-left-off');
      const ro = document.getElementById('light-right-off');

      lv.className = 'light-valid' + (s.lights.left_hit ? ' on-left' : '');
      rv.className = 'light-valid' + (s.lights.right_hit ? ' on-right' : '');
      lo.className = 'light-off' + (s.lights.left_off ? ' on' : '');
      ro.className = 'light-off' + (s.lights.right_off ? ' on' : '');

      // Scores
      document.getElementById('score-left').textContent = s.scores.left;
      document.getElementById('score-right').textContent = s.scores.right;

      // Timer
      const m = Math.floor(s.timer.seconds / 60);
      const sec = s.timer.seconds % 60;
      const td = document.getElementById('timer-display');
      td.textContent = m + ':' + String(sec).padStart(2, '0');
      td.className = 'timer-display' + (s.timer.seconds <= 30 && s.timer.seconds > 0 ? ' low' : '');

      timerRunning = s.timer.running;
      const btn = document.getElementById('btn-toggle');
      if (timerRunning) {
        btn.textContent = 'STOP';
        btn.classList.add('running');
      } else {
        btn.textContent = 'START';
        btn.classList.remove('running');
      }

      // Period
      document.getElementById('period-num').textContent = s.period;
    }

    function triggerBuzzer() {
      document.body.classList.add('buzzer');
      setTimeout(() => document.body.classList.remove('buzzer'), 1300);
    }

    // Modals
    function openSetTime() {
      document.getElementById('modal-settime').classList.add('open');
      document.getElementById('input-time').focus();
    }
    function openSettings() {
      document.getElementById('input-ws').value = wsUrl;
      document.getElementById('modal-settings').classList.add('open');
      document.getElementById('input-ws').focus();
    }
    function closeModals() {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
    }
    function applySetTime() {
      const val = document.getElementById('input-time').value.trim();
      send('set_time ' + val);
      closeModals();
    }
    function applySettings() {
      wsUrl = document.getElementById('input-ws').value.trim() || wsUrl;
      closeModals();
      connect();
    }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModals(); });
    });

    document.addEventListener('keydown', e => {
      if (document.querySelector('.modal-overlay.open')) return;
      const k = e.key;
      if (k === ' ') { e.preventDefault(); toggleTimer(); }
      if (k === 'Escape') send('stop');
      if (k === 'c' || k === 'C') send('clear');
    });

    connect();
  </script>
</body>

</html>
